<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OCR 주기장 검색</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="./manifest.json" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .app-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 800;
    }

    .app-desc {
      margin: 0 0 20px;
      color: #475569;
      font-size: 14px;
      line-height: 1.6;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
      margin-bottom: 16px;
    }

    .card h2,
    .card summary {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
    }

    .card summary {
      cursor: pointer;
      list-style: none;
    }

    .card summary::-webkit-details-marker {
      display: none;
    }

    .card summary::after {
      content: "▾";
      float: right;
      color: #64748b;
      font-size: 14px;
      margin-top: 3px;
    }

    details:not([open]) summary::after {
      content: "▸";
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }
